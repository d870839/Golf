<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Minigolf</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="hud">
      <span>Strokes: <strong id="strokes">0</strong></span>
      <span id="message"></span>
      <span class="hint">Click &amp; drag the ball to aim. Release to shoot. R to reset.</span>
    </div>
    <canvas id="game" width="800" height="500"></canvas>
    <script src="game.js"></script>
  </body>
</html>
